name: CI

# Run on every push to main and on every pull request targeting main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Playwright tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      # Node 24 matches the local dev version; npm cache speeds up repeat runs.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # `npm ci` installs exactly what's in package-lock.json (reproducible),
      # and compiles the better-sqlite3 native module for this runner's Node.
      - name: Install dependencies
        run: npm ci

      # Type-check / compile the TypeScript app (mirrors `npm run build`).
      - name: Build
        run: npm run build

      # Install the Chromium browser Playwright drives, plus its OS deps.
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # Playwright's webServer block seeds the DB and starts the app itself,
      # then waits on /healthz before the suite runs. CI=true is set by GitHub
      # Actions automatically, which enables retries + single-worker mode.
      - name: Run Playwright tests
        run: npm test

      # Keep the HTML report (and traces from any retried failures) so you can
      # download and inspect results from the run's summary page.
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
